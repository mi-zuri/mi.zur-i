<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>mi.zur-i | music</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="music portfolio — coming soon" />
    <meta name="author" content="Michał Żurawski" />
    <link rel="stylesheet" href="https://use.typekit.net/lgc5ifx.css" />
    <script>
      if (localStorage.getItem("dark-mode") === "1") {
        document.documentElement.style.setProperty("--bg-primary", "#1c1c1c");
      }
    </script>
    <style>
      :root {
        --font-primary: "birch-std", monospace;
        --text-primary: #722a1f;
        --bg-primary: #c7c7c7;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: monospace;
        color: var(--text-primary);
        background: var(--bg-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-family: var(--font-primary);
        font-weight: normal;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 1;
      }
      p {
        font-size: 1rem;
        opacity: 0.8;
      }
      a {
        color: var(--text-primary);
        text-decoration: none;
        border-bottom: 2px solid;
        padding-bottom: 0.1rem;
      }
      a:hover {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h1>music</h1>
    <p>coming soon ^.^</p>
    <a href="/">← back to home</a>
